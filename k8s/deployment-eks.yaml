# EKS deployment: uses ECR image and vijil-sample-agents namespace (testing agents).
# Console can reach this at http://vijil-travel-agent.vijil-sample-agents.svc.cluster.local:9000
#
# Prerequisites:
#   - Build and push image first: make eks-push (or see docs/EKS_DEPLOYMENT.md)
#   - Secret vijil-secrets in namespace vijil-sample-agents with key GROQ_API_KEY
#   - Namespace vijil-sample-agents (create if needed: kubectl create namespace vijil-sample-agents)
#
# Apply: kubectl apply -f k8s/deployment-eks.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vijil-travel-agent
  namespace: vijil-sample-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vijil-travel-agent
  template:
    metadata:
      labels:
        app: vijil-travel-agent
    spec:
      containers:
      - name: agent
        # Defaults to :latest; use `kubectl set image` (see docs/EKS_DEPLOYMENT.md)
        # to roll out a specific git SHA for reproducible deploys.
        image: 266735823956.dkr.ecr.us-west-2.amazonaws.com/vijil-travel-agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9000
        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: vijil-secrets
              key: GROQ_API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /.well-known/agent.json
            port: 9000
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /.well-known/agent.json
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: vijil-travel-agent
  namespace: vijil-sample-agents
spec:
  selector:
    app: vijil-travel-agent
  ports:
  - port: 9000
    targetPort: 9000
---
# Optional: internal NLB Service for Lambda/API Gateway
# Creates an internal Network Load Balancer so VPC-based Lambdas (or other
# VPC clients) can reach the unprotected travel agent directly.
apiVersion: v1
kind: Service
metadata:
  name: vijil-travel-agent-nlb
  namespace: vijil-sample-agents
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  selector:
    app: vijil-travel-agent
  ports:
  - name: http
    port: 9000
    targetPort: 9000
