# EKS deployment for Dome-protected travel agent (namespace vijil-sample-agents).
# Requires vijil-secrets in vijil-sample-agents with GROQ_API_KEY and OPENAI_API_KEY.
#
# Apply: kubectl apply -f k8s/deployment-domed-eks.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vijil-domed-travel-agent
  namespace: vijil-sample-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vijil-domed-travel-agent
  template:
    metadata:
      labels:
        app: vijil-domed-travel-agent
    spec:
      containers:
      - name: agent
        image: 266735823956.dkr.ecr.us-west-2.amazonaws.com/vijil-travel-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9000
        env:
        - name: DOME_ENABLED
          value: "1"
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: vijil-secrets
              key: GROQ_API_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: vijil-secrets
              key: OPENAI_API_KEY
        - name: DOME_FAST_MODE
          value: "1"
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /.well-known/agent.json
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /.well-known/agent.json
            port: 9000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: vijil-domed-travel-agent
  namespace: vijil-sample-agents
spec:
  selector:
    app: vijil-domed-travel-agent
  ports:
  - port: 9000
    targetPort: 9000
